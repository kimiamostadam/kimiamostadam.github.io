 <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kimia Mostadam | UX Researcher @ Meta</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --accent-purple: #9D50BB;
            --glass-bg: rgba(255, 255, 255, 0.4);
            --glass-border: rgba(157, 80, 187, 0.2);
            --bg-warm: #FFF8F0;
        }

        body { font-family: 'Inter', sans-serif; background-color: var(--bg-warm); color: #333; }
        h1, h2, h3, h4 { font-family: 'Playfair Display', serif; color: #1a1a1a; }

        .bento-grid {
            display: grid;
            grid-template-columns: repeat(12, 1fr);
            gap: 1.5rem;
        }

        .bento-box {
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 2rem;
            transition: all 0.4s ease;
            text-decoration: none;
            color: inherit;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .bento-box:hover {
            transform: translateY(-8px);
            border-color: var(--accent-purple);
            box-shadow: 0 15px 30px rgba(157, 80, 187, 0.15);
        }

        .cs-large { grid-column: span 7; }
        .cs-medium { grid-column: span 5; }
        .cs-small { grid-column: span 6; }

        @media (max-width: 1024px) {
            .cs-large, .cs-medium, .cs-small { grid-column: span 12; }
        }

        .tag {
            background: rgba(157, 80, 187, 0.1);
            color: var(--accent-purple);
            padding: 0.3rem 0.8rem;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: bold;
            margin-bottom: 1rem;
            display: inline-block;
        }
